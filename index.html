<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sjøfiskevarsel – Ottøysundet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a1628;
    --surface:  #112240;
    --surface2: #1a3256;
    --gold:     #c9a84c;
    --gold2:    #e8c97a;
    --blue:     #4a9eca;
    --blue2:    #6dbde8;
    --green:    #4caf82;
    --red:      #e05252;
    --text:     #e8f0f8;
    --muted:    #7a95b0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header {
    text-align: center; padding: 2.5rem 1rem 1.5rem;
    background: linear-gradient(180deg, #061022 0%, var(--bg) 100%);
    border-bottom: 1px solid rgba(74,158,202,0.15);
  }
  .icon { font-size: 2.8rem; margin-bottom: 0.5rem; }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3rem); font-weight: 900; color: var(--text); line-height: 1.1;
  }
  header h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.3rem, 4vw, 2rem); font-weight: 700; color: var(--blue2); margin-top: 0.1rem;
  }
  .location { font-size: 0.75rem; letter-spacing: 0.15em; color: var(--muted); margin-top: 0.5rem; text-transform: uppercase; }
  .updated { font-size: 0.75rem; color: var(--muted); margin-top: 0.4rem; }

  main { max-width: 480px; margin: 0 auto; padding: 1.2rem 1rem 3rem; }

  /* CARD */
  .card {
    background: var(--surface); border-radius: 1.2rem;
    padding: 1.2rem 1rem; margin-bottom: 1rem;
    border: 1px solid rgba(74,158,202,0.15);
  }
  .card-title {
    font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 0.8rem;
  }

  /* TIDEVANN STATUS */
  .tide-status {
    display: flex; align-items: center; gap: 1rem;
    background: var(--surface); border-radius: 1.2rem;
    padding: 1.1rem 1.2rem; margin-bottom: 1rem;
    border: 1px solid rgba(74,158,202,0.2);
  }
  .tide-height-wrap { text-align: center; min-width: 4rem; }
  .tide-height-val {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem; font-weight: 700; line-height: 1; color: var(--blue2);
  }
  .tide-height-unit { font-size: 0.7rem; color: var(--muted); margin-top: 0.1rem; }
  .tide-dir-wrap { flex: 1; }
  .tide-dir {
    font-size: 1.1rem; font-weight: 600;
    display: flex; align-items: center; gap: 0.4rem;
  }
  .tide-dir.rising { color: var(--green); }
  .tide-dir.falling { color: var(--blue2); }
  .tide-next {
    font-size: 0.8rem; color: var(--muted); margin-top: 0.3rem; line-height: 1.4;
  }
  .tide-next strong { color: var(--text); }

  /* SCORE CARD */
  .score-card {
    background: var(--surface); border-radius: 1.2rem;
    padding: 1.5rem; margin-bottom: 1rem;
    border: 1px solid rgba(74,158,202,0.15);
  }
  .score-label { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.8rem; }
  .score-row { display: flex; align-items: flex-end; gap: 1.2rem; margin-bottom: 1rem; }
  .score-number { font-family: 'Playfair Display', serif; font-size: 4.5rem; font-weight: 900; line-height: 1; min-width: 3.5rem; }
  .score-info { flex: 1; }
  .score-title { font-size: 1.4rem; font-weight: 600; color: var(--text); line-height: 1.1; }
  .score-desc { font-size: 0.82rem; color: var(--muted); margin-top: 0.3rem; line-height: 1.5; }

  /* FACTOR BREAKDOWN */
  .factors { display: flex; flex-direction: column; gap: 0.45rem; margin-bottom: 1rem; }
  .factor-row { display: flex; align-items: center; gap: 0.6rem; }
  .factor-name { font-size: 0.72rem; color: var(--muted); min-width: 4.5rem; }
  .factor-bar-wrap { flex: 1; height: 5px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; }
  .factor-bar { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .factor-val { font-size: 0.72rem; font-weight: 600; min-width: 2rem; text-align: right; }

  /* SCORE MAIN BAR */
  .score-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.08); overflow: hidden; }
  .score-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; background: linear-gradient(90deg, var(--gold), var(--gold2)); }

  /* WEATHER ROW */
  .weather-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.6rem; margin-bottom: 1rem; }
  .weather-chip {
    background: var(--surface); border-radius: 0.9rem;
    padding: 0.8rem 0.5rem; text-align: center;
    border: 1px solid rgba(74,158,202,0.1);
  }
  .weather-chip .wc-icon { font-size: 1.4rem; }
  .weather-chip .wc-val { font-size: 0.9rem; font-weight: 600; color: var(--text); margin-top: 0.2rem; }
  .weather-chip .wc-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 0.1rem; }

  canvas { width: 100%; border-radius: 0.5rem; display: block; }

  /* CHART LEGEND */
  .chart-legend {
    display: flex; gap: 1rem; margin-top: 0.6rem; flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 0.35rem; font-size: 0.7rem; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .legend-line { width: 16px; height: 2px; border-top: 2px dashed var(--gold2); flex-shrink: 0; }
  .legend-fill { width: 16px; height: 8px; border-radius: 2px; background: rgba(201,168,76,0.25); flex-shrink: 0; }

  /* BEST TIMES */
  .best-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .best-item {
    display: flex; align-items: center; gap: 0.8rem;
    background: var(--surface2); border-radius: 0.8rem; padding: 0.7rem 0.9rem;
  }
  .best-time { font-size: 1rem; font-weight: 600; color: var(--blue2); min-width: 3rem; }
  .best-mid { flex: 1; }
  .best-reason { font-size: 0.7rem; color: var(--muted); margin-bottom: 0.3rem; }
  .best-bar-wrap { height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
  .best-bar { height: 100%; border-radius: 3px; }
  .best-score-num { font-size: 0.9rem; font-weight: 600; min-width: 2rem; text-align: right; }

  /* 7 DAGER */
  .day-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .day-item {
    display: flex; align-items: center; gap: 0.7rem;
    background: var(--surface2); border-radius: 0.8rem; padding: 0.7rem 0.9rem;
  }
  .day-name { font-size: 0.85rem; font-weight: 500; min-width: 2.8rem; color: var(--text); }
  .day-icon { font-size: 1.1rem; }
  .day-temp { font-size: 0.8rem; color: var(--muted); min-width: 4rem; }
  .day-wind { font-size: 0.8rem; color: var(--muted); flex: 1; }
  .day-badge { font-size: 0.7rem; font-weight: 600; padding: 0.2rem 0.6rem; border-radius: 1rem; }
  .day-best-time { font-size: 0.72rem; color: var(--blue2); min-width: 3.2rem; text-align: right; }

  /* SCORE COLORS */
  .score-excellent { color: var(--green); }
  .score-good      { color: var(--gold); }
  .score-ok        { color: var(--blue); }
  .score-poor      { color: var(--red); }
  .badge-excellent { background: rgba(76,175,130,0.2); color: var(--green); }
  .badge-good      { background: rgba(201,168,76,0.2); color: var(--gold); }
  .badge-ok        { background: rgba(74,158,202,0.2); color: var(--blue); }
  .badge-poor      { background: rgba(224,82,82,0.15); color: var(--red); }

  .loading { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 0.9rem; }
  .error-msg { background: rgba(224,82,82,0.1); border: 1px solid rgba(224,82,82,0.3); border-radius: 0.8rem; padding: 1rem; color: var(--red); text-align: center; font-size: 0.85rem; }
</style>
</head>
<body>

<header>
  <div class="icon">⚓</div>
  <h1>Sjøfiskevarsel</h1>
  <h2>Ottøysundet</h2>
  <div class="location">Sandsfjorden · Ryfylke · Rogaland</div>
  <div class="updated" id="updated">Laster data…</div>
</header>

<main>
  <div id="app"><div class="loading">Henter tidevann og vær…</div></div>
</main>

<script>
const API = '/api/fiske';

/* ── Hjelpefunksjonar ─────────────────────────────────────── */
function scoreClass(s) { return s >= 75 ? 'excellent' : s >= 55 ? 'good' : s >= 35 ? 'ok' : 'poor'; }
function scoreLabel(s) { return s >= 75 ? 'Utmerket' : s >= 55 ? 'Bra' : s >= 35 ? 'Greit' : 'Dårlig'; }
function factorColor(s) { return s >= 75 ? '#4caf82' : s >= 55 ? '#c9a84c' : s >= 35 ? '#4a9eca' : '#e05252'; }

function buildScoreDesc(score) {
  if (!score) return '–';
  const parts = [];
  if (score.windScore < 40)       parts.push(`vind ${Math.round(score.wind)} m/s er for sterk`);
  else if (score.windScore >= 80) parts.push('fin vindstille');
  if (score.tideScore >= 75)      parts.push('nær høy-/lavvann');
  else if (score.tideScore < 40)  parts.push('midt mellom tidevann');
  if (score.timeScore >= 90)      parts.push('perfekt tidspunkt på dagen');
  else if (score.timeScore < 45)  parts.push('ikke beste tid på dagen');
  if (score.rainScore < 50)       parts.push('nedbør reduserer');
  return parts.length ? parts.join(' · ') : 'Middels forhold på dei fleste faktorar.';
}

function bestTimeReason(v) {
  const tags = [];
  if (v.tideScore >= 70) tags.push('nær HV/LV');
  if (v.windScore >= 75) tags.push('lite vind');
  if (v.timeScore >= 90) tags.push(/* timeScore 100=morgen,95=kveld */ v.timeScore === 100 ? 'morgon' : 'kveld');
  if (v.rainScore >= 90) tags.push('opplett');
  return tags.join(' · ') || 'ok forhold';
}

function weatherIcon(c) {
  if (c === 0) return '☀️'; if (c <= 2) return '🌤️'; if (c <= 3) return '☁️';
  if (c <= 49) return '🌫️'; if (c <= 59) return '🌦️'; if (c <= 69) return '🌧️';
  if (c <= 79) return '🌨️'; if (c <= 82) return '⛈️'; return '🌩️';
}
function windIcon(s) { return s <= 3 ? '🌊' : s <= 8 ? '💨' : '🌬️'; }
function dayName(d) { return new Date(d).toLocaleDateString('no-NO', { weekday: 'short' }); }

function timeUntil(isoTime) {
  const ms = new Date(isoTime).getTime() - Date.now();
  if (ms <= 0) return 'nå';
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  return h > 0 ? `om ${h}t ${m}min` : `om ${m}min`;
}

function getTideState(tideData) {
  const nowMs = Date.now();
  let curIdx = -1;
  for (let i = 0; i < tideData.length - 1; i++) {
    if (new Date(tideData[i].time).getTime() <= nowMs &&
        new Date(tideData[i+1].time).getTime() > nowMs) {
      curIdx = i; break;
    }
  }
  if (curIdx < 0) return null;
  const height = tideData[curIdx].value;
  const rising = tideData[curIdx + 1].value > height;
  const nextExtreme = tideData.slice(curIdx + 1).find(t => t.flag === 'high' || t.flag === 'low') || null;
  return { height, rising, nextExtreme };
}

/* ── Tidevannskart ────────────────────────────────────────── */
function renderTideChart(canvas, tideData, hourlyScores) {
  const ctx  = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const dpr  = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, W, H);
  if (!tideData.length) return;

  const today = new Date(); today.setHours(0,0,0,0);
  const end   = new Date(today); end.setDate(end.getDate() + 2);
  const startMs = today.getTime(), endMs = end.getTime(), spanMs = endMs - startMs;

  const pts = tideData.filter(t => {
    const ms = new Date(t.time).getTime();
    return ms >= startMs && ms < endMs;
  });
  if (pts.length < 2) return;

  const vals  = pts.map(p => p.value);
  const minV  = Math.min(...vals) - 8;
  const maxV  = Math.max(...vals) + 8;
  const range = maxV - minV;

  const pad   = { t: 20, b: 40, l: 36, r: 10 };
  const cw    = W - pad.l - pad.r;
  const ch    = H - pad.t - pad.b;

  const toXms = ms  => pad.l + ((ms - startMs) / spanMs) * cw;
  const toXi  = i   => toXms(new Date(pts[i].time).getTime());
  const toY   = v   => pad.t + ch - ((v - minV) / range) * ch;
  const fs    = n   => `${n * dpr}px DM Sans`;

  // ── Fiskescore-bakgrunn per time
  Object.entries(hourlyScores)
    .filter(([k]) => { const ms = new Date(k).getTime(); return ms >= startMs && ms < endMs; })
    .sort((a, b) => a[0].localeCompare(b[0]))
    .forEach(([k, v]) => {
      const ms = new Date(k).getTime();
      const x1 = toXms(ms), x2 = toXms(ms + 3600000);
      ctx.fillStyle = `rgba(201,168,76,${(v.total / 100) * 0.22})`;
      ctx.fillRect(x1, pad.t, x2 - x1, ch);
    });

  // ── Horisontale gridlinjer + Y-akse
  [0, 0.33, 0.67, 1].forEach(frac => {
    const v = minV + range * frac;
    const y = toY(v);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
    ctx.fillStyle = 'rgba(122,149,176,0.65)';
    ctx.font = fs(8.5); ctx.textAlign = 'right';
    ctx.fillText(Math.round(v), pad.l - 4, y + 3.5);
  });
  ctx.fillStyle = 'rgba(122,149,176,0.45)';
  ctx.font = fs(7.5); ctx.textAlign = 'left';
  ctx.fillText('cm', 2, pad.t + 9);

  // ── Tidvannskurve
  ctx.beginPath();
  ctx.moveTo(toXi(0), toY(pts[0].value));
  for (let i = 1; i < pts.length; i++) {
    const mx = (toXi(i-1) + toXi(i)) / 2;
    ctx.bezierCurveTo(mx, toY(pts[i-1].value), mx, toY(pts[i].value), toXi(i), toY(pts[i].value));
  }
  ctx.strokeStyle = 'rgba(74,158,202,0.9)';
  ctx.lineWidth = 2 * dpr; ctx.stroke();

  // Fyll under kurva
  ctx.lineTo(toXi(pts.length-1), H - pad.b);
  ctx.lineTo(toXi(0), H - pad.b);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, pad.t, 0, H - pad.b);
  grad.addColorStop(0, 'rgba(74,158,202,0.28)');
  grad.addColorStop(1, 'rgba(74,158,202,0.02)');
  ctx.fillStyle = grad; ctx.fill();

  // ── HV/LV-merke
  pts.forEach((p, i) => {
    if (p.flag !== 'high' && p.flag !== 'low') return;
    const x = toXi(i), y = toY(p.value);
    ctx.beginPath(); ctx.arc(x, y, 4.5 * dpr, 0, Math.PI*2);
    ctx.fillStyle = p.flag === 'high' ? '#4caf82' : '#e05252'; ctx.fill();
    const t = new Date(p.time).toLocaleTimeString('no-NO', { hour:'2-digit', minute:'2-digit' });
    ctx.fillStyle = '#e8f0f8'; ctx.font = fs(9); ctx.textAlign = 'center';
    const isHigh = p.flag === 'high';
    ctx.fillText((isHigh ? '▲ ' : '▼ ') + Math.round(p.value) + ' cm', x, y + (isHigh ? -14*dpr : 12*dpr));
    ctx.fillStyle = 'rgba(122,149,176,0.8)';
    ctx.fillText(t, x, y + (isHigh ? -4*dpr : 22*dpr));
  });

  // ── Tidsakse (kvar 6. time, 48h)
  for (let h = 0; h <= 48; h += 6) {
    const ms  = startMs + h * 3600000;
    const x   = toXms(ms);
    const lh  = new Date(ms).getHours();
    const isDayBreak = lh === 0 && h > 0;

    ctx.strokeStyle = isDayBreak ? 'rgba(255,255,255,0.18)' : 'rgba(255,255,255,0.07)';
    ctx.lineWidth = isDayBreak ? 1.5 : 1; ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(x, pad.t); ctx.lineTo(x, H - pad.b + 4); ctx.stroke();

    if (isDayBreak) {
      const dag = new Date(ms).toLocaleDateString('no-NO', { weekday: 'short' }).toUpperCase();
      ctx.fillStyle = 'rgba(200,210,225,0.8)'; ctx.font = `bold ${9*dpr}px DM Sans`; ctx.textAlign = 'center';
      ctx.fillText(dag, x, H - pad.b + 15);
      ctx.fillStyle = 'rgba(122,149,176,0.6)'; ctx.font = fs(8.5);
      ctx.fillText('00:00', x, H - pad.b + 26);
    } else {
      ctx.fillStyle = 'rgba(122,149,176,0.65)'; ctx.font = fs(9); ctx.textAlign = 'center';
      ctx.fillText(String(lh).padStart(2,'0') + ':00', x, H - pad.b + 15);
    }
  }

  // ── "NÅ"-linje
  const nowX = toXms(Date.now());
  if (nowX >= pad.l && nowX <= W - pad.r) {
    ctx.strokeStyle = 'rgba(232,201,122,0.85)';
    ctx.lineWidth = 1.5 * dpr; ctx.setLineDash([4*dpr, 3*dpr]);
    ctx.beginPath(); ctx.moveTo(nowX, pad.t + 4); ctx.lineTo(nowX, H - pad.b); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(232,201,122,0.95)';
    ctx.font = `bold ${8.5*dpr}px DM Sans`; ctx.textAlign = 'center';
    ctx.fillText('NÅ', nowX, pad.t - 1);
  }
}

/* ── Hovudfunksjon ────────────────────────────────────────── */
async function load() {
  const app = document.getElementById('app');
  try {
    const data = await fetch(API).then(r => r.json());
    if (!data.ok) throw new Error(data.error);

    const now    = new Date();
    const nowKey = now.toISOString().slice(0, 13).replace(/T(\d)$/, 'T0$1');
    // Bruk klientens lokale tid for å finne aktuell score
    const localKey = `${now.toLocaleDateString('sv').replace(/-/g,'').replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3')}T${String(now.getHours()).padStart(2,'0')}`;
    const cs   = data.hourlyScores[localKey]?.total ?? data.currentScore?.total ?? 0;
    const csObj = data.hourlyScores[localKey] ?? data.currentScore ?? {};
    const sc   = scoreClass(cs);
    const w    = data.weather;

    // Tidevanns-tilstand
    const tide = getTideState(data.tideData);

    // Beste tider i dag (kommande)
    const todayStr = now.toLocaleDateString('sv');
    const todayScores = Object.entries(data.hourlyScores)
      .filter(([k]) => k.startsWith(todayStr) && parseInt(k.slice(11, 13)) >= now.getHours())
      .sort((a, b) => b[1].total - a[1].total)
      .slice(0, 5);

    document.getElementById('updated').textContent =
      'Sist oppdatert: ' + now.toLocaleTimeString('no-NO', { hour:'2-digit', minute:'2-digit' });

    app.innerHTML = `

      <!-- TIDEVANN STATUS -->
      ${tide ? `<div class="tide-status">
        <div class="tide-height-wrap">
          <div class="tide-height-val">${Math.round(tide.height)}</div>
          <div class="tide-height-unit">cm</div>
        </div>
        <div class="tide-dir-wrap">
          <div class="tide-dir ${tide.rising ? 'rising' : 'falling'}">
            ${tide.rising ? '↑ Stigande' : '↓ Fallande'}
          </div>
          ${tide.nextExtreme ? `<div class="tide-next">
            Neste <strong>${tide.nextExtreme.flag === 'high' ? '▲ høyvann' : '▼ lavvann'}</strong>
            kl. ${new Date(tide.nextExtreme.time).toLocaleTimeString('no-NO', { hour:'2-digit', minute:'2-digit' })}
            <span style="color:var(--blue2)">${timeUntil(tide.nextExtreme.time)}</span>
            · ${Math.round(tide.nextExtreme.value)} cm
          </div>` : ''}
        </div>
      </div>` : ''}

      <!-- FISKEINDEKS -->
      <div class="score-card">
        <div class="score-label">Fiskeindeks akkurat nå</div>
        <div class="score-row">
          <div class="score-number score-${sc}">${cs}</div>
          <div class="score-info">
            <div class="score-title">${scoreLabel(cs)}</div>
            <div class="score-desc">${buildScoreDesc(csObj)}</div>
          </div>
        </div>
        <div class="factors">
          ${[
            ['Tidevann', csObj.tideScore ?? 0],
            ['Vind',     csObj.windScore ?? 0],
            ['Tidspunkt',csObj.timeScore ?? 0],
            ['Nedbør',   csObj.rainScore ?? 0],
          ].map(([name, val]) => `
            <div class="factor-row">
              <div class="factor-name">${name}</div>
              <div class="factor-bar-wrap">
                <div class="factor-bar" style="width:${val}%;background:${factorColor(val)}"></div>
              </div>
              <div class="factor-val score-${scoreClass(val)}">${val}</div>
            </div>`).join('')}
        </div>
        <div class="score-bar"><div class="score-fill" style="width:${cs}%"></div></div>
      </div>

      <!-- VÆR -->
      <div class="weather-row">
        <div class="weather-chip">
          <div class="wc-icon">${weatherIcon(w.wcode)}</div>
          <div class="wc-val">${w.temp !== null ? Math.round(w.temp) + '°' : '–'}</div>
          <div class="wc-label">Temp</div>
        </div>
        <div class="weather-chip">
          <div class="wc-icon">${windIcon(w.wind)}</div>
          <div class="wc-val">${w.wind !== null ? Math.round(w.wind) + ' m/s' : '–'}</div>
          <div class="wc-label">Vind</div>
        </div>
        <div class="weather-chip">
          <div class="wc-icon">🌧️</div>
          <div class="wc-val">${w.rain !== null ? w.rain.toFixed(1) + ' mm' : '–'}</div>
          <div class="wc-label">Nedbør</div>
        </div>
        <div class="weather-chip">
          <div class="wc-icon">${tide?.rising ? '↑' : '↓'}</div>
          <div class="wc-val">${tide ? Math.round(tide.height) + ' cm' : '–'}</div>
          <div class="wc-label">Tidevann</div>
        </div>
      </div>

      <!-- TIDEVANNSKART -->
      <div class="card">
        <div class="card-title">Tidevann neste 48 timer</div>
        <canvas id="tideCanvas" width="440" height="180"></canvas>
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-dot" style="background:#4caf82"></div> Høyvann</div>
          <div class="legend-item"><div class="legend-dot" style="background:#e05252"></div> Lavvann</div>
          <div class="legend-item"><div class="legend-line"></div> Nå</div>
          <div class="legend-item"><div class="legend-fill"></div> Godt fiske</div>
        </div>
      </div>

      <!-- BESTE TIDER I DAG -->
      <div class="card">
        <div class="card-title">Beste fisketider i dag</div>
        <div class="best-list">
          ${todayScores.map(([k, v]) => {
            const h   = parseInt(k.slice(11,13));
            const sc2 = scoreClass(v.total);
            return `<div class="best-item">
              <div class="best-time">kl.&nbsp;${String(h).padStart(2,'0')}</div>
              <div class="best-mid">
                <div class="best-reason">${bestTimeReason(v)}</div>
                <div class="best-bar-wrap">
                  <div class="best-bar" style="width:${v.total}%;background:${factorColor(v.total)}"></div>
                </div>
              </div>
              <div class="best-score-num score-${sc2}">${v.total}</div>
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- 7 DAGER -->
      <div class="card">
        <div class="card-title">7-dagers oversikt</div>
        <div class="day-list">
          ${data.daily.slice(0, 7).map(d => {
            const bs  = d.bestScore ?? 0;
            const sc3 = scoreClass(bs);
            return `<div class="day-item">
              <div class="day-name">${dayName(d.date)}</div>
              <div class="day-icon">${weatherIcon(d.wcode)}</div>
              <div class="day-temp">${d.tempMax !== null ? Math.round(d.tempMax)+'°/'+Math.round(d.tempMin)+'°' : '–'}</div>
              <div class="day-wind">${d.windMax !== null ? Math.round(d.windMax)+' m/s' : ''}</div>
              <div class="day-badge badge-${sc3}">${scoreLabel(bs)}</div>
              <div class="day-best-time">${d.bestHour !== null ? 'kl. '+String(d.bestHour).padStart(2,'0') : ''}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    `;

    // Tegn kart etter layout
    requestAnimationFrame(() => {
      const canvas = document.getElementById('tideCanvas');
      if (!canvas) return;
      const cw = canvas.offsetWidth || 440;
      canvas.width  = cw * devicePixelRatio;
      canvas.height = 180 * devicePixelRatio;
      canvas.style.width  = '100%';
      canvas.style.height = '180px';
      renderTideChart(canvas, data.tideData, data.hourlyScores);
    });

  } catch (err) {
    app.innerHTML = `<div class="error-msg">Kunne ikkje hente data: ${err.message}</div>`;
  }
}

load();
setInterval(load, 30 * 60 * 1000);
</script>
</body>
</html>
